services:
  self-lora:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${SELF_LORA_PORT:-8010}:${SELF_LORA_PORT:-8010}"
    environment:
      SELF_LORA_HOST: ${SELF_LORA_HOST:-0.0.0.0}
      SELF_LORA_PORT: ${SELF_LORA_PORT:-8010}
      SELF_LORA_INTERNAL_TOKEN: ${SELF_LORA_INTERNAL_TOKEN}
      SELF_LORA_AUTH_HEADER: ${SELF_LORA_AUTH_HEADER:-Authorization}
      SELF_LORA_AUTH_SCHEME: ${SELF_LORA_AUTH_SCHEME:-Bearer}
      SELF_LORA_DATA_DIR: ${SELF_LORA_DATA_DIR:-/var/lib/self-lora}
      SELF_LORA_SCRATCH_DIR: ${SELF_LORA_SCRATCH_DIR:-/var/lib/self-lora/scratch}
      SELF_LORA_ALLOWED_BASE_MODELS: ${SELF_LORA_ALLOWED_BASE_MODELS:-flux_dev,flux_schnell}
      SELF_LORA_PUBLIC_BASE_URL: ${SELF_LORA_PUBLIC_BASE_URL:-http://127.0.0.1:8010}
      SELF_LORA_DATABASE_URL: ${SELF_LORA_DATABASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      SELF_LORA_REDIS_URL: ${SELF_LORA_REDIS_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      SELF_LORA_S3_ENDPOINT_URL: ${SELF_LORA_S3_ENDPOINT_URL:-}
      SELF_LORA_S3_ACCESS_KEY_ID: ${SELF_LORA_S3_ACCESS_KEY_ID:-}
      SELF_LORA_S3_SECRET_ACCESS_KEY: ${SELF_LORA_S3_SECRET_ACCESS_KEY:-}
      SELF_LORA_S3_BUCKET: ${SELF_LORA_S3_BUCKET:-}
      SELF_LORA_S3_REGION: ${SELF_LORA_S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      SELF_LORA_CDN_BASE_URL: ${SELF_LORA_CDN_BASE_URL:-}
      CDN_BASE_URL: ${CDN_BASE_URL:-}
      SELF_LORA_OLLAMA_BASE_URL: ${SELF_LORA_OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      SELF_LORA_OLLAMA_TIMEOUT_SECONDS: ${SELF_LORA_OLLAMA_TIMEOUT_SECONDS:-120}
      SELF_LORA_TRAINER_COMMAND: ${SELF_LORA_TRAINER_COMMAND:-python3 /srv/self-lora/trainers/router.py}
      SELF_LORA_TRAINER_PROVIDER: ${SELF_LORA_TRAINER_PROVIDER:-mock-image-lora}
      SELF_LORA_IMAGE_LORA_COMMAND: ${SELF_LORA_IMAGE_LORA_COMMAND:-python3 /srv/self-lora/trainers/image_lora_wrapper.py}
      SELF_LORA_IMAGE_LORA_BACKEND_COMMAND: ${SELF_LORA_IMAGE_LORA_BACKEND_COMMAND:-}
      SELF_LORA_VIDEO_LORA_COMMAND: ${SELF_LORA_VIDEO_LORA_COMMAND:-python3 /srv/self-lora/trainers/video_lora_wrapper.py}
      SELF_LORA_VIDEO_LORA_BACKEND_COMMAND: ${SELF_LORA_VIDEO_LORA_BACKEND_COMMAND:-}
      SELF_LORA_CHAT_WRAPPER_COMMAND: ${SELF_LORA_CHAT_WRAPPER_COMMAND:-python3 /srv/self-lora/trainers/chat_ollama_wrapper.py}
      SELF_LORA_TTS_WRAPPER_COMMAND: ${SELF_LORA_TTS_WRAPPER_COMMAND:-python3 /srv/self-lora/trainers/voice_tts_wrapper.py}
      SELF_LORA_STT_WRAPPER_COMMAND: ${SELF_LORA_STT_WRAPPER_COMMAND:-python3 /srv/self-lora/trainers/voice_stt_wrapper.py}
      SELF_LORA_TSS_BASE_URL: ${SELF_LORA_TSS_BASE_URL:-http://127.0.0.1:9001}
      SELF_LORA_TSS_TIMEOUT_SECONDS: ${SELF_LORA_TSS_TIMEOUT_SECONDS:-300}
      SELF_LORA_TSS_POLL_SECONDS: ${SELF_LORA_TSS_POLL_SECONDS:-1.5}
      SELF_LORA_REDIS_QUEUE_PREFIX: ${SELF_LORA_REDIS_QUEUE_PREFIX:-self-lora}
      SELF_LORA_LEASE_TTL_SECONDS: ${SELF_LORA_LEASE_TTL_SECONDS:-90}
      SELF_LORA_QUEUE_POLL_TIMEOUT_SECONDS: ${SELF_LORA_QUEUE_POLL_TIMEOUT_SECONDS:-5}
      SELF_LORA_CHAT_WORKER_COUNT: ${SELF_LORA_CHAT_WORKER_COUNT:-1}
      SELF_LORA_LORA_WORKER_COUNT: ${SELF_LORA_LORA_WORKER_COUNT:-1}
      SELF_LORA_DEFAULT_CHAT_WAIT_SECONDS: ${SELF_LORA_DEFAULT_CHAT_WAIT_SECONDS:-5}
      SELF_LORA_DEFAULT_LORA_DURATION_MINUTES: ${SELF_LORA_DEFAULT_LORA_DURATION_MINUTES:-15}
      SELF_LORA_DEFAULT_CHAT_COST_GEMS: ${SELF_LORA_DEFAULT_CHAT_COST_GEMS:-0}
      SELF_LORA_DEFAULT_LORA_COST_GEMS: ${SELF_LORA_DEFAULT_LORA_COST_GEMS:-0}
    volumes:
      - ./state:${SELF_LORA_DATA_DIR:-/var/lib/self-lora}
    restart: unless-stopped
    gpus: all
